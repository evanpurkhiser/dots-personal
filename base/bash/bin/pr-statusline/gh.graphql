{
  viewer {
    pullRequests(states: OPEN, first: 20, orderBy: { field: CREATED_AT, direction: DESC }) {
      edges {
        node {
          id
          number
          title
          url
          createdAt
          repository {
            nameWithOwner
          }
          reviewDecision
          autoMergeRequest {
            enabledAt
          }
          commits(last: 1) {
            nodes {
              commit {
                statusCheckRollup {
                  state
                }
              }
            }
          }
        }
      }
    }
  }
}
